<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>楽家事研究室 - 文字数カウンター（テスト用）</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }
        h1 {
            color: #4a5568;
            font-size: 24px;
            margin-bottom: 5px;
        }
        p {
            color: #718096;
            font-size: 14px;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            resize: none;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        textarea:focus {
            border-color: #3182ce;
            outline: none;
        }
        .counter {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #2d3748;
        }
        .count-num {
            font-size: 28px;
            color: #3182ce;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>楽家事研究室</h1>
    <p>GitHub Pages アップロードテスト用アプリ（文字数カウンター）</p>
    
    <textarea id="textInput" placeholder="ここに文字を入力するか、貼り付けてください..."></textarea>
    
    <div class="counter">
        文字数: <span id="charCount" class="count-num">0</span> 文字
    </div>
</div>

<script>
    const textInput = document.getElementById('textInput');
    const charCount = document.getElementById('charCount');

    textInput.addEventListener('input', () => {
        // 空白や改行も含めてカウントするシンプルな仕様
        charCount.textContent = textInput.value.length;
    });
</script>

</body>
</html>
